{% extends "base.html" %}

{% block title %}
    {{ book.title }} - Details
{% endblock %}

{% block content %}
    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-12 col-md-4 mb-4 text-center">
                {% if book.cover_picture %}
                    <img src="{{ book.cover_picture.url }}" alt="{{ book.title }} cover"
                         class="img-fluid rounded shadow" style="max-height: 500px; object-fit: cover;">
                {% else %}
                    <img src="https://via.placeholder.com/400x600?text=No+Cover" alt="No cover"
                         class="img-fluid rounded shadow"
                         style="max-height: 500px; object-fit: cover; background-color: #f8f9fa;">
                {% endif %}
            </div>
            <div class="col-12 col-md-8">
                <h1 class="mb-3 fw-bold">{{ book.title }}</h1>
                <hr>
                <h5 class="mt-4 mb-3 text-muted">Description</h5>
                <p class="lead" style="font-size: 1.1rem; line-height: 1.8; text-align: justify;">
                    {{ book.description }}
                </p>
                <div class="mt-5">
                    <a href="{% url 'books:list' %}" class="btn btn-outline-secondary px-4">
                        &larr; Back to Books
                    </a>
                </div>
            </div>

        </div>
    </div>

{% endblock %}
