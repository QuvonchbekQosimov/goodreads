{% extends "base.html" %}

{% block title %}
    Login Page
{% endblock %}


{% block content %}

    <h1>
        Login Page
    </h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
        <span class="ms-4"> Don't have account? <a href="{% url 'users:register' %}">Register now!</a> </span>

    </form>

{% endblock %}
