{% extends "base.html" %}
{% load crispy_forms_tags %}


{% block title %}
    Login Page
{% endblock %}


{% block content %}

    <h3>
        Login
    </h3>

    <div class="row">
        <div class="col-5">
            <form method="post">
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-primary">Login</button>
                <span class="ms-4"> Don't have account? <a href="{% url 'users:register' %}">Register now!</a> </span>

            </form>
        </div>
    </div>

{% endblock %}
